<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamentos migraram — Service Report</title>
<!-- Página estática de APOSENTADORIA do editor legado de orçamentos (C0b, trilha comercial).
     Regras: sem Supabase, sem módulos do app, sem escrita, sem repasse de parâmetros da URL.
     O editor oficial vive no app Gestão Comercial. O redirecionamento automático usa URL
     FIXA (nunca location.search/hash). O arquivo js/orcamentos.js permanece no repo por
     histórico, mas não é mais carregado por página alguma. -->
<meta http-equiv="refresh" content="12; url=https://comercialapp.vercel.app">
<style>
  :root{color-scheme:light dark}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#F4F5F8;color:#1B2430;font-family:'Manrope','Segoe UI',system-ui,sans-serif;text-align:center;padding:24px}
  @media (prefers-color-scheme:dark){body{background:#14171C;color:#E8EAF0}}
  .box{max-width:460px}
  .ic{width:52px;height:52px;margin:0 auto 14px;color:#1E8AE0}
  .ic svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  h1{font-size:20px;font-weight:800;letter-spacing:-.01em;margin:0 0 8px}
  p{font-size:14px;line-height:1.6;margin:0 0 6px;color:#4A5468}
  @media (prefers-color-scheme:dark){p{color:#AAB2C0}}
  a.btn{display:inline-block;margin-top:18px;background:#1E8AE0;color:#fff;text-decoration:none;
        font-weight:800;font-size:14px;padding:12px 22px;border-radius:11px}
  a.btn:focus-visible{outline:2px solid #1E8AE0;outline-offset:3px}
  .mut{font-size:12px;color:#7C8698;margin-top:14px}
</style>
</head>

  <div class="box">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 3h7v7"/><path d="M21 3 11 13"/><path d="M20 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5"/></svg></div>
    <h1>Os orçamentos migraram para o Gestão Comercial</h1>

    <a class="btn" href="https://comercialapp.vercel.app">Abrir o Gestão Comercial</a>
