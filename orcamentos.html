<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamentos — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/orcamentos.js"></script>
<style>
  /* Lista */
  .orc-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .orc-filtros{display:flex;gap:6px;flex-wrap:wrap}
  .orc-filtros .chip{font:inherit;font-size:12px;padding:6px 11px;border:1px solid var(--bd);border-radius:20px;background:var(--sur);cursor:pointer;color:var(--tx2)}
  .orc-filtros .chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
  .orc-table{width:100%;border-collapse:collapse;font-size:13px}
  .orc-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--tx3);padding:8px 10px;border-bottom:1px solid var(--bd)}
  .orc-table td{padding:10px;border-bottom:1px solid var(--bd);color:var(--tx)}
  .orc-table tr.row-click{cursor:pointer}
  .orc-table tr.row-click:hover td{background:var(--sur2)}
  .orc-num{font-family:var(--mono);font-size:12px;color:var(--tx2)}
  .orc-total{font-weight:600}

  /* Editor */
  .ed-card{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:18px;box-shadow:var(--sh);margin-bottom:16px}
  .ed-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .ed-grid .full{grid-column:1/-1}
  .fg label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:5px}
  .fg input,.fg textarea,.fg select{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:8px;font:inherit;font-size:14px;outline:none;background:#fff}
  .fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:30;background:#fff;border:1px solid #cfd8e6;border-radius:10px;max-height:340px;overflow-y:auto;box-shadow:0 14px 36px rgba(20,30,55,.18);display:none}
  .ac-list.open{display:block}
  .ac-item{padding:10px 13px;font-size:13.5px;cursor:pointer;border-top:1px solid var(--bd)}
  .ac-item:first-child{border-top:none}
  .ac-item:hover{background:#eef4ff}
  .ac-empty{padding:11px 13px;font-size:13px;color:var(--tx3)}
  .ac-prod{display:flex;align-items:baseline;gap:10px}
  .ac-prod .ac-cod{font-family:var(--mono);font-size:11px;color:var(--tx3);min-width:74px;font-weight:600}
  .ac-prod .ac-desc{flex:1;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ac-prod .ac-preco{font-family:var(--mono);font-size:12px;font-weight:600;color:#1f7a4d;white-space:nowrap}
  /* Busca de material em destaque */
  .mat-search{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:#f3f6fc;border:1px solid #dbe3f0;border-radius:10px;padding:12px;margin-bottom:12px}
  .mat-search .ac{flex:1;min-width:240px}
  .mat-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.55;pointer-events:none}
  .mat-input{width:100%;padding:11px 12px 11px 34px;border:1px solid var(--bd);border-radius:8px;font:inherit;font-size:14px;outline:none;background:#fff}
  .mat-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}

  /* Itens */
  .it-group{margin-bottom:18px}
  .it-group h4{font-size:13px;font-weight:700;color:var(--tx);margin:0 0 8px}
  .it-table{width:100%;border-collapse:collapse;font-size:13px}
  .it-table th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--tx3);padding:6px 8px;border-bottom:1px solid var(--bd)}
  .it-table td{padding:5px 8px;border-bottom:1px solid var(--bd);vertical-align:middle}
  .it-table input{width:100%;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;font:inherit;font-size:13px}
  .it-table .col-qtd{width:90px}
  .it-table .col-preco{width:120px}
  .it-table .col-sub{width:120px;text-align:right;font-family:var(--mono);font-size:12px;white-space:nowrap}
  .it-table .col-x{width:34px;text-align:center}
  .it-x{border:none;background:none;color:var(--re);font-size:16px;cursor:pointer;line-height:1}
  .it-add{margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .grp-tot{text-align:right;font-size:12px;color:var(--tx2);margin-top:6px}
  .ed-totais{display:flex;flex-direction:column;gap:4px;align-items:flex-end;font-size:13px;margin-top:6px}
  .ed-totais .grand{font-size:18px;font-weight:700;color:var(--tx)}
  .ed-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .muted{color:var(--tx3);font-size:12px}
</style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Orçamentos</span>
    </div>
    <div class="content">

      <!-- LISTA -->
      <div id="view-lista">
        <div class="orc-toolbar">
          <div class="orc-filtros" id="orc-filtros">
            <button class="chip on" data-f="ativos">Ativos</button>
            <button class="chip" data-f="rascunho">Rascunho</button>
            <button class="chip" data-f="enviado">Enviado</button>
            <button class="chip" data-f="aprovado">Aprovado</button>
            <button class="chip" data-f="nao_aprovado">Não aprovado</button>
            <button class="chip" data-f="arquivado">Arquivados</button>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn" id="btn-de-preorc">De um pré-orçamento</button>
            <button class="btn btn-p" id="btn-novo">+ Novo orçamento</button>
          </div>
        </div>
        <div id="lista-box"></div>
      </div>

      <!-- EDITOR -->
      <div id="view-editor" style="display:none">
        <div class="ed-card">
          <div class="ed-grid">
            <div class="fg">
              <label>Cliente *</label>
              <div class="ac">
                <input type="text" id="e-cliente-busca" placeholder="Buscar cliente…" autocomplete="off">
                <input type="hidden" id="e-cliente">
                <div class="ac-list" id="e-cliente-list"></div>
              </div>
            </div>
            <div class="fg">
              <label>Origem</label>
              <input type="text" id="e-origem" readonly value="Novo (sem pré-orçamento)" style="background:var(--sur2)">
            </div>
            <div class="fg">
              <label>Prazo de execução</label>
              <input type="text" id="e-prazo" placeholder="Ex.: 5 dias úteis">
            </div>
            <div class="fg full">
              <label>Observações</label>
              <textarea id="e-observacoes" rows="2" placeholder="Validade, horário de execução, condições…"></textarea>
              <label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-top:8px;cursor:pointer">
                <input type="checkbox" id="e-obs-horario" style="width:auto">
                <span>Serviço executado em horário comercial (segunda a sexta, das 7h às 17h).</span>
              </label>
            </div>
          </div>
        </div>

        <div class="ed-card">
          <!-- Escopo do serviço (descrição livre + valor único) -->
          <div class="it-group">
            <h4>Serviço</h4>
            <div class="fg" style="margin-bottom:10px">
              <textarea id="e-servico-desc" rows="5" placeholder="1ª linha = resumo do serviço (em destaque).&#10;Demais linhas = itens em tópicos, um por linha. Ex.:&#10;Lançamento de cabo de rede Cat6A até o ponto da câmera&#10;Conectorização dos pontos nas extremidades&#10;Certificação conforme norma ANSI/TIA-568.2-D"></textarea>
            </div>
            <div class="prod-add" style="grid-template-columns:1fr 160px">
              <div class="fg" style="margin-bottom:0"><label>Valor do serviço (R$)</label><input type="number" id="e-servico-valor" inputmode="decimal" min="0" step="any" placeholder="0,00"></div>
              <div class="fg" style="margin-bottom:0"><label>Subtotal serviços</label><input type="text" id="tot-servico" readonly value="—" style="background:var(--sur2)"></div>
            </div>
          </div>

          <!-- Materiais -->
          <div class="it-group">
            <h4>Materiais</h4>
            <div class="mat-search">
              <div class="ac">
                <span class="mat-ic">🔍</span>
                <input type="text" id="mat-busca" class="mat-input" placeholder="Buscar produto do catálogo (código ou descrição)…" autocomplete="off">
                <input type="hidden" id="mat-sel">
                <div class="ac-list" id="mat-list"></div>
              </div>
              <button class="btn btn-p btn-sm" id="add-material">+ Adicionar</button>
              <button class="btn btn-sm" id="add-avulso">+ Item avulso</button>
            </div>
            <table class="it-table">
              <thead><tr><th>Produto / descrição</th><th class="col-qtd">Qtd</th><th class="col-preco">Valor unit.</th><th class="col-sub">Subtotal</th><th class="col-x"></th></tr></thead>
              <tbody id="tb-material"></tbody>
            </table>
            <div class="grp-tot">Subtotal materiais: <strong id="tot-material">—</strong></div>
          </div>
        </div>

        <div class="ed-card">
          <div class="ed-grid">
            <div class="fg">
              <label>Condição de pagamento</label>
              <input type="text" id="e-condicao" placeholder="Ex.: 50% entrada, 50% na entrega / 30 dias">
            </div>
            <div class="fg">
              <label>&nbsp;</label>
              <div class="ed-totais">
                <div>Serviços: <span id="rt-servico">—</span> &nbsp;·&nbsp; Materiais: <span id="rt-material">—</span></div>
                <div class="grand">Total: <span id="rt-total">—</span></div>
              </div>
            </div>
          </div>
          <div id="ed-banner" style="display:none;margin-bottom:10px;padding:10px 12px;border-radius:8px;font-size:13px"></div>
          <div class="ed-actions">
            <button class="btn" id="btn-voltar">← Voltar</button>
            <button class="btn btn-p" id="btn-salvar">Salvar rascunho</button>
            <button class="btn" id="btn-aprovar" title="Aprova e gera a Tarefa (OS)">✓ Aprovar</button>
            <button class="btn" id="btn-naoaprovado">Não aprovado</button>
            <button class="btn" id="btn-reabrir" style="display:none">Reabrir p/ revisão</button>
            <button class="btn" id="btn-arquivar">Arquivar</button>
            <button class="btn" id="btn-desarquivar" style="display:none">Desarquivar</button>
            <button class="btn" id="btn-excluir" style="color:var(--re)">🗑 Excluir</button>
            <button class="btn" id="btn-pdf" title="Gera o PDF do orçamento (servidor)">Gerar PDF</button>
            <span class="muted" id="ed-status"></span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  // Portal comercial/administrativo. Técnico não acessa (sem RLS de orçamento).
  window.PAGE_ALLOWED = ['admin', 'gestor_axis', 'comercial']
  async function onPostLogin() {
    renderSidebar('orcamentos')
    await OrcamentosApp.init()
  }
  renderSidebar('orcamentos')
  initAuth()
</script>
</body>
</html>
