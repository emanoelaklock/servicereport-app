<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="sidebar-container"></div>

<div class="main">

    <div class="topbar">
      <span class="topbar-title">Relatórios</span>
    </div>
    <div class="content">
      <div class="tcard">

            <thead><tr><th>Data</th><th>Cliente</th><th>Tipo</th><th>Preenchimento</th><th>Sync</th><th></th></tr></thead>

              <tr><td colspan="6" class="dim" style="text-align:center;padding:24px">Lista + botão Faturar chegam no passo 7 (fatia 1).</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis']
  async function onPostLogin() { renderSidebar('relatorios') }
  renderSidebar('relatorios')
  initAuth()
</script>
