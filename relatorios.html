<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/relatorios.js"></script>
<style>
  .chip-filtro{cursor:pointer}
  .det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
  .det-item{background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
  .det-fotos{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .det-foto{display:flex;flex-direction:column;gap:3px;width:84px;margin:0}
  .det-fotos img{width:84px;height:84px;object-fit:cover;border-radius:8px;border:1px solid var(--bd)}
  .det-foto figcaption{font-size:10px;color:var(--tx3);line-height:1.2}
  .det-sig{margin-top:6px;max-width:100%;border:1px solid var(--bd);border-radius:8px;background:#fff}
  /* Detalhe da RAT — layout de relatório */
  #modal-ver .modal{max-width:680px;width:94%}
  #modal-ver .mf{flex-wrap:wrap}
  .rd{font-size:13px}
  .rd-head{margin-bottom:6px}
  .rd-cli{font-size:18px;font-weight:700;color:var(--tx1);line-height:1.2}
  .rd-sub{font-size:13px;color:var(--ac);font-weight:600;margin-top:2px}
  .rd-meta{display:flex;flex-wrap:wrap;gap:3px 16px;margin-top:7px;font-size:12px;color:var(--tx1)}
  .rd-meta b{color:var(--tx3);font-weight:500}
  .rd-sec{margin-top:16px}
  .rd-sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);border-bottom:1px solid var(--bd);padding-bottom:5px;margin-bottom:9px}
  .rd-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .rd-f{background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:7px 10px}
  .rd-f label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:2px}
  .rd-f .v{font-size:13px;color:var(--tx1)}
  .rd-long{white-space:pre-wrap;line-height:1.5;color:var(--tx1)}
  .rd-edit{width:100%;min-height:92px;resize:vertical;font:inherit;line-height:1.5;padding:9px 11px;border:1px solid var(--ac);border-radius:8px;background:var(--sur1);color:var(--tx1);box-sizing:border-box}
  .rd-edit-hint{font-size:11px;color:var(--ac);margin:8px 0 14px;display:flex;align-items:center;gap:6px}
  .rd-prod{display:flex;flex-direction:column;gap:4px}
  .rd-prod div{font-size:13px;color:var(--tx1)}
  .rd-f input,.rd-f select{width:100%;font:inherit;font-size:13px;margin-top:3px;padding:5px 7px;border:1px solid var(--ac);border-radius:6px;background:var(--sur1);color:var(--tx1);box-sizing:border-box}
</style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar">
      <span class="topbar-title">Relatórios</span>
    </div>
    <div class="content">
      <div class="chips">
        <span class="chip chip-filtro" data-f="todas">Todas</span>
        <span class="chip chip-filtro" data-f="faturar">A faturar</span>
        <span class="chip chip-filtro" data-f="pendencia">Com pendência</span>
      </div>
      <div class="tcard">
        <div class="twrap">
          <table>
            <thead><tr>
              <th>Data</th><th>Cliente</th><th>Tipo</th><th>Status</th>
              <th>Preenchimento</th><th>Sync</th><th>Faturamento</th><th>Ações</th>
            </tr></thead>
            <tbody id="tbody-rel">
              <tr><td colspan="8" class="dim" style="text-align:center;padding:24px">Carregando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Ver detalhe -->
<div class="mback" id="modal-ver">
  <div class="modal">
    <div class="mh"><span class="mt">Detalhe da RAT</span><button class="mx" onclick="RelatoriosApp.fechar('modal-ver')">✕</button></div>
    <div class="mb" id="ver-body"></div>
    <div class="mf">
      <button class="btn" id="ver-excluir" style="margin-right:auto;color:var(--re);border-color:var(--re)">🗑 Excluir</button>
      <button class="btn" id="ver-cancelar" style="display:none">Cancelar</button>
      <button class="btn" id="ver-editar">✎ Editar</button>
      <button class="btn btn-pri" id="ver-salvar" style="display:none">Salvar</button>
      <button class="btn" id="ver-pdf">⬇ Baixar PDF</button>
      <button class="btn" onclick="RelatoriosApp.fechar('modal-ver')">Fechar</button>
    </div>
  </div>
</div>

<!-- Modal: Faturar -->
<div class="mback" id="modal-faturar">
  <div class="modal">
    <div class="mh"><span class="mt">Faturar RAT</span><button class="mx" onclick="RelatoriosApp.fechar('modal-faturar')">✕</button></div>
    <div class="mb">
      <div class="fg"><label>Número da nota (opcional)</label><input type="text" id="f-nota" placeholder="Ex.: 12345"/></div>
      <p class="dim">Marca a RAT como faturada e registra a data de faturamento.</p>
    </div>
    <div class="mf">
      <button class="btn" onclick="RelatoriosApp.fechar('modal-faturar')">Cancelar</button>
      <button class="btn btn-g" onclick="RelatoriosApp.confirmarFaturar()">Confirmar faturamento</button>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis']
  async function onPostLogin() {
    renderSidebar('relatorios')
    await RelatoriosApp.init()
  }
  renderSidebar('relatorios')
  initAuth()
</script>
</body>
</html>
