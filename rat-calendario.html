<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAT — Calendário · Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/rat-calendario.js"></script>
<style>
  /* Calendário de RATs — usa só tokens existentes (var(--card)/--line/--tx/--ac/...) */
  .rc-wrap{padding:20px 24px 28px;display:flex;flex-direction:column;gap:16px}
  .rc-filtros{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .rc-fh{display:flex;align-items:center;gap:8px;margin-bottom:13px;font-size:12.5px;font-weight:700;color:var(--tx)}
  .rc-fh .mut{font-size:11.5px;color:var(--tx2);font-weight:500}
  .rc-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .rc-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .rc-checks{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .rc-chk{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--tx);background:#fff;border:1px solid var(--bd2);border-radius:999px;padding:6px 12px;cursor:pointer;user-select:none}
  .rc-chk input{margin:0;accent-color:var(--ac)}
  .rc-chk:has(input:checked){background:var(--acl);border-color:var(--ac);color:var(--ac)}
  .rc-filtros label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px}
  .rc-filtros input,.rc-filtros select{width:100%;font:inherit;font-size:13px;color:var(--tx);background:#fff;border:1px solid var(--bd2);border-radius:9px;padding:8px 10px;outline:none}
  .rc-fact{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
  .rc-adv-toggle{margin-top:8px;border:none;background:transparent;color:var(--ac);font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:4px 2px}
  .rc-adv-toggle svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
  .rc-adv-toggle[aria-expanded="true"] svg{transform:rotate(180deg)}
  .rc-adv{margin-top:12px}
  .rc-cal{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(20,28,46,.04),0 10px 28px rgba(20,28,46,.06)}
  .rc-toolbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .rc-nav{width:34px;height:34px;border:1px solid var(--bd2);border-radius:9px;background:#fff;color:var(--tx);display:inline-grid;place-items:center;cursor:pointer}
  .rc-nav svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .rc-mtitle{font-size:17px;font-weight:800;letter-spacing:-.4px;color:var(--title);min-width:170px}
  .rc-hoje{height:34px;padding:0 14px;border:1px solid var(--bd2);border-radius:9px;background:#fff;font:inherit;font-size:12.5px;font-weight:700;color:var(--tx);cursor:pointer}
  .rc-legend{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .rc-legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--tx2)}
  .rc-legend i{width:8px;height:8px;border-radius:50%;flex:none}
  .rc-wd{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);border-bottom:1px solid var(--line)}
  .rc-wd div{padding:9px 10px;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px}
  .rc-grid7{display:grid;grid-template-columns:repeat(7,1fr)}
  .rc-cell{min-height:152px;padding:9px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden}
  .rc-cell:nth-child(7n){border-right:none}
  .rc-cell.rc-out{background:#FAFBFC}
  .rc-dhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .rc-dnum{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--tx)}
  .rc-dnum.today{background:var(--ac);color:#fff;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(30,138,224,.35)}
  .rc-dcount{font-size:10px;font-weight:700;color:var(--tx2);background:var(--bg);border-radius:999px;padding:1px 7px}
  .rc-chip{display:block;width:100%;text-align:left;border:none;cursor:pointer;border-radius:9px;padding:8px 11px;margin-bottom:6px;overflow:hidden;font-family:inherit;transition:filter .12s,box-shadow .12s,transform .12s}
  .rc-chip:hover{filter:brightness(.98);box-shadow:0 4px 11px rgba(20,28,46,.14);transform:translateY(-1px)}
  .rc-chip .task{display:block;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rc-chip .cli{display:block;font-size:13.5px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .rc-chip .tec{display:block;font-size:11.5px;font-weight:600;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* prévia da Orientação ao técnico — até 2 linhas, com reticências */
  .rc-chip .ori{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:11px;font-weight:500;color:var(--tx2);line-height:1.35;margin-top:4px;padding-top:4px;border-top:1px solid rgba(20,28,46,.07);white-space:normal}
  .rc-more{border:none;background:transparent;color:var(--ac);font-size:10.5px;font-weight:700;cursor:pointer;padding:2px 4px;font-family:inherit}
  .rc-empty{padding:40px;text-align:center;color:var(--tx2);font-size:13px}
  .rc-mback{position:fixed;inset:0;background:rgba(20,28,46,.42);display:none;place-items:center;z-index:60;padding:20px}
  .rc-mback.open{display:grid}
  .rc-modal{width:360px;max-height:80vh;overflow:auto;background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--shl)}
  .rc-modal-h{display:flex;align-items:center;margin-bottom:12px}
  .rc-modal-h .t{font-size:15px;font-weight:700;color:var(--title)}
  .rc-modal-h button{margin-left:auto;border:none;background:transparent;font-size:20px;color:var(--tx2);cursor:pointer}
  .rc-badge-sync{display:inline-flex;align-items:center;gap:6px;background:var(--exec-bg);color:var(--exec-fg);font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px}
  .rc-badge-sync i{width:7px;height:7px;border-radius:50%;background:var(--exec-m)}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><h1>RAT — Calendário</h1>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <span class="mut" id="rc-count" style="font-size:12.5px;color:var(--tx2);font-weight:600"></span>
        <span class="rc-badge-sync"><i></i>Leitura</span>
      </div>
    </div>
    <div class="scrollarea">
      <div class="rc-wrap">
        <div class="rc-filtros">
          <div class="rc-fh">Filtros <span class="mut">· preencha e clique em Buscar</span></div>
          <!-- principais (sempre visíveis) -->
          <div class="rc-grid2">
            <div><label>Cliente</label><input id="rcf-cliente" list="rcf-cliente-list" autocomplete="off" placeholder="Comece a digitar o cliente…"><datalist id="rcf-cliente-list"></datalist></div>
            <div><label>Busca geral</label><input id="rcf-busca" placeholder="Procura em tudo: técnico, nº, PC, orçamento e o que está descrito na RAT…"></div>
          </div>
          <button type="button" class="rc-adv-toggle" id="rcf-adv-toggle" aria-expanded="false">Filtros avançados <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></button>
          <!-- avançados (escondidos) -->
          <div class="rc-adv" id="rcf-adv" hidden>
            <div style="margin-bottom:13px">
              <label>Técnicos responsáveis <span class="mut" style="font-weight:500">· um ou mais</span></label>
              <div class="rc-checks" id="rcf-tecnicos"></div>
            </div>
            <div class="rc-grid4">
              <div><label>Status</label><select id="rcf-status"></select></div>
              <div><label>Nº da tarefa</label><input id="rcf-tarefa" placeholder="04741"></div>
              <div><label>Nº da RAT</label><input id="rcf-rat" placeholder="04741/01"></div>
              <div><label>Período — de</label><input id="rcf-de" type="date"></div>
              <div><label>Período — até</label><input id="rcf-ate" type="date"></div>
            </div>
          </div>
          <div class="rc-fact">
            <button class="btn btn-ghost" id="rcf-limpar">Limpar</button>
            <button class="btn btn-primary" id="rcf-buscar">Buscar</button>
          </div>
        </div>

        <div class="rc-cal">
          <div class="rc-toolbar">
            <div style="display:flex;align-items:center;gap:4px">
              <button class="rc-nav" id="rc-prev" title="Mês anterior"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
              <button class="rc-nav" id="rc-next" title="Próximo mês"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
            </div>
            <div class="rc-mtitle" id="rc-title">—</div>
            <button class="rc-hoje" id="rc-hoje">Hoje</button>
            <div class="rc-legend" id="rc-legend"></div>
          </div>
          <div class="rc-wd"><div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div></div>
          <div class="rc-grid7" id="rc-grid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="rc-mback" id="rc-mback"><div class="rc-modal"><div class="rc-modal-h"><span class="t" id="rc-modal-t"></span><button id="rc-modal-x">×</button></div><div id="rc-modal-body"></div></div></div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis', 'comercial']
  async function onPostLogin() {
    renderSidebar('rat')
    await RatCalendarApp.init()
  }
  renderSidebar('rat')
  initAuth()
</script>
</body>
</html>
