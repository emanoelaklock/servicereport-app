<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Service Report — Técnico</title>
<meta name="theme-color" content="#1B2A4A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/db-local.js"></script>
<script src="js/sync.js"></script>
<script src="js/tecnico.js"></script>
<style>
  body{display:block;background:var(--bg)}
  .field-wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .field-top{height:56px;background:#1B2A4A;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50}
  .field-top .ft-title{font-size:15px;font-weight:600;flex:1}
  .field-top .ft-logout{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:8px 12px;font:inherit;font-size:13px;cursor:pointer}
  .field-top .ft-back{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;width:32px;height:32px;font-size:20px;line-height:1;cursor:pointer;margin-right:8px;flex:none}
  .field-body{flex:1;padding:18px 16px}

  /* Home (3 botões) */
  .home-hello{font-size:18px;font-weight:700;color:var(--tx);margin:4px 2px 16px}
  .home-grid{display:flex;flex-direction:column;gap:12px}
  .home-card{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:18px 18px;box-shadow:var(--sh);cursor:pointer;font:inherit;width:100%}
  .home-card:active{background:var(--sur2)}
  .home-card .home-ic{font-size:26px;margin-bottom:6px}
  .home-card .home-tt{font-size:16px;font-weight:600;color:var(--tx)}
  .home-card .home-sb{font-size:12px;color:var(--tx3)}
  .home-card.soon{opacity:.62}
  .net-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .net-on{background:#E8F5E9;color:#2E7D32}
  .net-off{background:#FEF3C7;color:#B45309}

  /* Lista de RATs */
  .lista-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .lista-head h2{font-size:15px;font-weight:600;color:var(--tx)}
  .rat-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer}
  .rat-card:active{background:var(--sur2)}
  .rat-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
  .rat-cli{font-weight:600;color:var(--tx);font-size:14px}
  .rat-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--tx3)}

  /* Form */
  .campo{margin-bottom:14px}
  .multi-chk{display:flex;flex-direction:column;gap:8px;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;background:var(--sur)}
  .multi-chk label{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--tx)}
  .multi-chk input[type=checkbox]{width:18px;height:18px}
  .prod-box{display:flex;flex-direction:column;gap:8px}
  .prod-add{display:grid;grid-template-columns:1fr 80px auto;gap:6px;align-items:center}
  .prod-add select,.prod-add input{padding:8px 9px;border:1px solid var(--bd);border-radius:8px;font:inherit;font-size:13px}
  .prod-list{display:flex;flex-direction:column;gap:6px}
  .prod-item{display:grid;grid-template-columns:1fr auto 24px;gap:8px;align-items:center;background:var(--sur);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:13px}
  .prod-item .prod-qtd{font-family:var(--mono);font-size:12px;color:var(--tx2)}
  .prod-item .thumb-x{position:static;width:22px;height:22px}
  /* Autocomplete */
  .ac{position:relative}
  .ac input[type=text]{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:14px;outline:none}
  .ac input[type=text]:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
  .ac-list{position:absolute;left:0;right:0;top:100%;z-index:30;background:#fff;border:1px solid var(--bd);border-radius:0 0 8px 8px;max-height:230px;overflow-y:auto;box-shadow:var(--sh);display:none}
  .ac-list.open{display:block}
  .ac-item{padding:9px 11px;font-size:13px;cursor:pointer;border-top:1px solid var(--bd)}
  .ac-item:hover{background:var(--sur2)}
  .ac-empty{padding:9px 11px;font-size:13px;color:var(--tx3)}
  .foto-box{display:flex;flex-direction:column;gap:8px}
  .thumbs{display:flex;flex-wrap:wrap;gap:10px}
  .thumb-card{display:flex;flex-direction:column;gap:4px;width:92px}
  .thumb{position:relative;width:92px;height:92px;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb-x{position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;border-radius:50%;background:rgba(27,42,74,.8);color:#fff;font-size:13px;cursor:pointer;line-height:1}
  .thumb-leg{width:92px;font-size:11px;padding:4px 6px;border:1px solid var(--bd);border-radius:6px;font-family:inherit}
  textarea.ta-longo{min-height:110px}
  .sig-wrap{position:relative}
  canvas.sig-pad{width:100%;height:170px;border:1px dashed var(--bd2);border-radius:10px;background:#fff;touch-action:none;display:block}
  .sig-clear{position:absolute;top:8px;right:8px}
  .form-actions{display:flex;gap:10px;margin-top:18px}
  .form-actions .btn{flex:1;justify-content:center;padding:12px}
</style>
</head>
<body>

<!-- LOGIN (técnico entra direto aqui) -->
<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="login-title">Service Report</div>
      <div class="login-sub">App do técnico</div>
      <div id="login-msg" style="margin-bottom:12px"></div>
      <div class="fg" style="margin-bottom:10px">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label>Senha</label>
        <input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()"/>
      </div>
      <button class="btn btn-p" style="width:100%;justify-content:center;padding:10px" id="btn-login" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- APP DE CAMPO -->
<div id="app-screen" style="display:none">
  <div class="field-wrap">
    <div class="field-top">
      <button class="ft-back" id="btn-voltar" style="display:none" aria-label="Voltar">‹</button>
      <span class="ft-title" id="ft-title">Service Report</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="net-badge" id="net-badge">—</span>
        <button class="ft-logout" onclick="fazerLogout()">Sair</button>
      </div>
    </div>
    <div class="field-body">

      <!-- HOME: 3 botões -->
      <div id="view-home">
        <div class="home-hello" id="home-hello">Olá!</div>
        <div class="home-grid">
          <button type="button" class="home-card" id="nav-os">
            <span class="home-ic">🧰</span>
            <span class="home-tt">Ordens de Serviço</span>
            <span class="home-sb">Suas OS e RATs do dia</span>
          </button>
          <button type="button" class="home-card" id="nav-preorc">
            <span class="home-ic">📝</span>
            <span class="home-tt">Pré-Orçamento</span>
            <span class="home-sb">Levantamento em campo</span>
          </button>
          <button type="button" class="home-card soon" id="nav-desloc">
            <span class="home-ic">🚚</span>
            <span class="home-tt">Deslocamento</span>
            <span class="home-sb">Pernoite · em breve</span>
          </button>
        </div>
        <div style="margin-top:18px;text-align:center">
          <button class="btn" id="btn-sync-home">↻ Sincronizar</button>
        </div>
      </div>

      <!-- LISTA -->
      <div id="view-lista" style="display:none">
        <div class="lista-head">
          <h2>Minhas RATs</h2>
          <div style="display:flex;gap:8px">
            <button class="btn" id="btn-sync" title="Sincronizar">↻ Sincronizar</button>
            <button class="btn btn-p" id="btn-nova">+ Nova RAT</button>
          </div>
        </div>
        <div id="lista-rats"></div>
      </div>

      <!-- FORMULÁRIO -->
      <div id="view-form" style="display:none">
        <div class="login-card" style="box-shadow:var(--sh)">
          <h2 id="form-titulo" style="font-size:16px;font-weight:600;margin-bottom:14px;color:var(--tx)">Nova RAT</h2>

          <div class="fg campo">
            <label>Cliente <span style="color:var(--re)">*</span></label>
            <div class="ac">
              <input type="text" id="f-cliente-busca" placeholder="Buscar cliente…" autocomplete="off">
              <input type="hidden" id="f-cliente">
              <div class="ac-list" id="ac-cliente-list"></div>
            </div>
          </div>
          <div class="fg campo">
            <label>Tipo de serviço <span style="color:var(--re)">*</span></label>
            <select id="f-tipo"><option value="">Selecione…</option></select>
          </div>

          <div id="campos-container"></div>

          <div class="fg campo">
            <label>Tempo trabalhado (calculado)</label>
            <input type="text" id="f-tempo" readonly value="—" style="background:var(--sur2)">
          </div>

          <div class="fg campo">
            <label>Status da RAT</label>
            <select id="f-status">
              <option value="Em andamento">Em andamento</option>
              <option value="Pausa">Pausa</option>
              <option value="Concluído">Concluído</option>
              <option value="Concluído com Pendências">Concluído com Pendências</option>
            </select>
          </div>

          <div class="form-actions">
            <button class="btn" id="btn-cancelar">Cancelar</button>
            <button class="btn btn-p" id="btn-salvar">Salvar no aparelho</button>
          </div>
        </div>
      </div>

      <!-- PRÉ-ORÇAMENTO: LISTA -->
      <div id="view-preorc-lista" style="display:none">
        <div class="lista-head">
          <h2>Meus pré-orçamentos</h2>
          <button class="btn btn-p" id="btn-preorc-novo">+ Novo</button>
        </div>
        <div id="lista-preorc"></div>
      </div>

      <!-- PRÉ-ORÇAMENTO: FORMULÁRIO FIXO -->
      <div id="view-preorc-form" style="display:none">
        <div class="login-card" style="box-shadow:var(--sh)">
          <h2 id="preorc-titulo" style="font-size:16px;font-weight:600;margin-bottom:14px;color:var(--tx)">Novo pré-orçamento</h2>

          <div class="fg campo">
            <label>Cliente <span style="color:var(--re)">*</span></label>
            <div class="ac">
              <input type="text" id="po-cliente-busca" placeholder="Buscar cliente…" autocomplete="off">
              <input type="hidden" id="po-cliente">
              <div class="ac-list" id="po-cliente-list"></div>
            </div>
          </div>

          <div class="fg campo">
            <label>Descrição do levantamento <span style="color:var(--re)">*</span></label>
            <textarea class="ta-longo" id="po-descricao" placeholder="O que foi avaliado, escopo, condições do local…"></textarea>
          </div>

          <div class="fg campo">
            <label>Materiais necessários</label>
            <div class="prod-box">
              <div class="prod-add">
                <div class="ac">
                  <input type="text" id="po-prod-busca" placeholder="Buscar produto…" autocomplete="off">
                  <input type="hidden" id="po-prod-sel">
                  <div class="ac-list" id="po-prod-ac-list"></div>
                </div>
                <input type="number" id="po-prod-qtd" inputmode="decimal" placeholder="Qtd" min="0" step="any">
                <button type="button" class="btn btn-sm" id="po-prod-add-btn">+ Add</button>
              </div>
              <div class="prod-list" id="po-prod-list"></div>
            </div>
          </div>

          <div class="fg campo">
            <label>Fotos</label>
            <div class="foto-box">
              <input type="file" accept="image/*" capture="environment" multiple id="po-foto-input" style="display:none">
              <button type="button" class="btn" id="po-btn-foto">📷 Adicionar foto</button>
              <div class="thumbs" id="po-thumbs"></div>
            </div>
          </div>

          <!-- Bloco de controle de tempo (mesma lógica da RAT) -->
          <div class="fg campo">
            <label>Houve deslocamento?</label>
            <select id="po-desloc">
              <option value="">Selecione…</option>
              <option value="Não">Não</option>
              <option value="Sim">Sim</option>
            </select>
          </div>
          <div id="po-bloco-sem" style="display:none">
            <div class="fg campo"><label>Início</label><input type="time" id="po-hora-inicio"></div>
            <div class="fg campo"><label>Término</label><input type="time" id="po-hora-termino"></div>
          </div>
          <div id="po-bloco-com" style="display:none">
            <div class="fg campo"><label>Início do deslocamento (ida)</label><input type="time" id="po-ida"></div>
            <div class="fg campo"><label>Fim do deslocamento (retorno)</label><input type="time" id="po-retorno"></div>
          </div>
          <div class="prod-add" style="grid-template-columns:1fr 1fr">
            <div class="fg campo" style="margin-bottom:0"><label>Almoço (min)</label><input type="number" id="po-almoco" inputmode="numeric" min="0" placeholder="0"></div>
            <div class="fg campo" style="margin-bottom:0"><label>Pausa (min)</label><input type="number" id="po-pausa" inputmode="numeric" min="0" placeholder="0"></div>
          </div>

          <div class="fg campo" style="margin-top:14px">
            <label>Tempo trabalhado (calculado)</label>
            <input type="text" id="po-tempo" readonly value="—" style="background:var(--sur2)">
          </div>

          <div class="form-actions">
            <button class="btn" id="po-btn-cancelar">Cancelar</button>
            <button class="btn btn-p" id="po-btn-salvar">Concluir</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  // Somente o técnico de campo permanece no app de campo.
  window.PAGE_ALLOWED = ['tecnico_campo']

  function pintarRede() {
    const b = document.getElementById('net-badge')
    if (!b) return
    const on = navigator.onLine
    b.textContent = on ? 'online' : 'offline'
    b.className = 'net-badge ' + (on ? 'net-on' : 'net-off')
  }
  window.addEventListener('online', pintarRede)
  window.addEventListener('offline', pintarRede)

  // Atualiza a lista e avisa quando uma rodada de sync termina.
  window.onSyncDone = ({ ok, fail }) => {
    if (window.TecnicoApp) TecnicoApp.refresh()
    if (ok) toast(`${ok} RAT(s) sincronizada(s).`, 'ok')
    if (fail) toast(`${fail} RAT(s) com erro de envio.`, 'err')
  }

  async function onPostLogin() {
    pintarRede()
    await TecnicoApp.init()
    document.getElementById('btn-sync').onclick = () => SyncEngine.syncAll()
    SyncEngine.start()
  }

  initAuth()

  // PWA: registra o service worker (shell offline)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('SW:', e))
    })
  }
</script>
</body>
</html>
