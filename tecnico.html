<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Service Report — Técnico</title>
<meta name="theme-color" content="#1B2A4A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/db-local.js"></script>
<style>
  body{display:block;background:var(--bg)}
  .field-wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .field-top{height:56px;background:#1B2A4A;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:50}
  .field-top .ft-title{font-size:15px;font-weight:600}
  .field-top .ft-logout{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:8px 12px;font:inherit;font-size:13px;cursor:pointer}
  .field-body{flex:1;padding:18px 16px}
  .net-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .net-on{background:#E8F5E9;color:#2E7D32}
  .net-off{background:#FEF3C7;color:#B45309}
</style>
</head>
<body>

<!-- LOGIN (técnico entra direto aqui) -->
<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="login-title">Service Report</div>
      <div class="login-sub">App do técnico</div>
      <div id="login-msg" style="margin-bottom:12px"></div>
      <div class="fg" style="margin-bottom:10px">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label>Senha</label>
        <input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()"/>
      </div>
      <button class="btn btn-p" style="width:100%;justify-content:center;padding:10px" id="btn-login" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>
</div>

<!-- APP DE CAMPO -->
<div id="app-screen" style="display:none">
  <div class="field-wrap">
    <div class="field-top">
      <span class="ft-title">Nova RAT</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="net-badge" id="net-badge">—</span>
        <button class="ft-logout" onclick="fazerLogout()">Sair</button>
      </div>
    </div>
    <div class="field-body">
      <div class="login-card" style="box-shadow:var(--sh)">
        <p class="dim">Olá, <b id="ft-nome" style="color:var(--tx)">técnico</b>.</p>
        <p class="dim" style="margin-top:8px">O formulário de RAT (cliente, tipo de serviço, questionário, foto e assinatura) e o salvamento local-first chegam nos passos 3–5 da fatia 1. Esta é a fundação: login do técnico, PWA instalável e shell offline já operando.</p>
      </div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  // Somente o técnico de campo permanece no app de campo.
  window.PAGE_ALLOWED = ['tecnico_campo']

  function pintarRede() {
    const b = document.getElementById('net-badge')
    if (!b) return
    const on = navigator.onLine
    b.textContent = on ? 'online' : 'offline'
    b.className = 'net-badge ' + (on ? 'net-on' : 'net-off')
  }
  window.addEventListener('online', pintarRede)
  window.addEventListener('offline', pintarRede)

  async function onPostLogin() {
    pintarRede()
    const u = await getUserRole()
    if (u?.nome) document.getElementById('ft-nome').textContent = u.nome
  }

  initAuth()

  // PWA: registra o service worker (shell offline)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('SW:', e))
    })
  }
</script>
</body>
</html>
