<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAT — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<link rel="stylesheet" href="css/rat-detalhe.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/rat-view.js"></script>
<script src="js/rat-editor.js"></script>
<script src="js/shared-pdf/pdf-engine.js"></script>
<script src="js/pdf-tarefa.js"></script>
<script src="js/rat-page.js"></script>
<style>
  body{background:#eef1f6}
  .rp-top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
          background:#fff;border-bottom:1px solid var(--bd);padding:12px 20px;box-shadow:0 1px 6px rgba(20,30,55,.06)}
  .rp-title{font-size:15px;font-weight:700;color:var(--tx);flex:1;min-width:160px}
  .rp-actions{display:flex;gap:8px;flex-wrap:wrap}
  .rp-wrap{max-width:1180px;margin:22px auto;padding:0 24px 40px;display:flex;flex-direction:column;gap:16px}
  .rp-msg{color:var(--tx3);font-size:14px;text-align:center;padding:40px 0}

  /* Cabeçalho — padrão do portal (card), sem faixa de documento */
  #rp-hero{background:#fff;border:1px solid var(--bd);border-radius:14px;box-shadow:0 1px 3px rgba(20,30,55,.05);padding:20px 22px}
  .rp-cli{font-size:23px;font-weight:800;color:var(--title);line-height:1.15;letter-spacing:-.3px}
  .rp-sub{font-size:13.5px;color:var(--blue);font-weight:600;margin-top:3px}
  .rp-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;align-items:stretch}
  .rp-chip{display:inline-flex;flex-direction:column;gap:1px;background:var(--sur2);border:1px solid var(--bd);
           border-radius:10px;padding:7px 13px;font-size:13.5px;color:var(--tx);font-weight:700}
  .rp-chip i{font-style:normal;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);font-weight:600}
  .rp-pill{display:inline-flex;align-items:center;padding:0 15px;border-radius:10px;font-size:12.5px;font-weight:700}

  /* Detalhe da RAT: visual compartilhado em css/rat-detalhe.css; aqui só o que é da página */
  #rp-body .rd{font-size:13px}

  /* Edição admin (técnicos): estilos compartilhados em css/rat-detalhe.css */

  /* Histórico de edições */
  #rp-hist .rd-sec{background:#fff;border:1px solid var(--bd);border-radius:14px;box-shadow:0 1px 3px rgba(20,30,55,.05);padding:18px 20px}
  .rp-hrow{display:flex;align-items:center;gap:12px;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--sur2)}
  .rp-hrow:last-child{border-bottom:none}
  .rp-hmain{font-size:13px;color:var(--tx);min-width:0}
  .rp-hsub{font-size:11.5px;color:var(--tx3);margin-top:2px;line-height:1.35}
  .det-sig{margin-top:6px;max-width:280px;border:1px solid var(--bd);border-radius:8px;background:#fff}

  /* Modal: Nova tarefa da pendência */
  .rp-modal{display:none;position:fixed;inset:0;background:rgba(20,30,55,.45);z-index:100;align-items:flex-start;justify-content:center;padding:60px 16px;overflow-y:auto}
  .rp-modal.open{display:flex}
  .rp-modal-box{background:#fff;border-radius:14px;box-shadow:0 24px 64px rgba(20,30,55,.28);width:100%;max-width:460px}
  .rp-modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd);font-size:15px;font-weight:700;color:var(--tx)}
  .rp-modal-x{border:none;background:none;font-size:18px;color:var(--tx3);cursor:pointer;line-height:1}
  .rp-modal-b{padding:18px 20px}
  .rp-modal-b label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:5px}
  .rp-modal-b select,.rp-modal-b textarea{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;font:inherit;font-size:14px;outline:none;box-sizing:border-box}
  .rp-modal-b textarea{line-height:1.5;resize:vertical}
  .rp-modal-f{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--bd)}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
<div id="app-screen" style="display:none">
  <div class="rp-top">
    <button class="btn" id="btn-voltar"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Voltar</button>
    <span class="rp-title" id="rp-title">RAT</span>
    <span class="rp-actions" id="rp-actions">
      <button class="btn btn-g" id="rp-encerrar" style="display:none"><svg viewBox="0 0 24 24"><path d="M21 11.5a9 9 0 1 1-5.3-8.2"/><path d="m9 11 3 3L22 4"/></svg>Encerrar RAT</button>
      <button class="btn" id="rp-editar"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Editar</button>
      <button class="btn btn-g" id="rp-salvar" style="display:none"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Salvar</button>
      <button class="btn" id="rp-cancelar" style="display:none"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>Cancelar</button>
      <button class="btn" id="rp-nova"><svg viewBox="0 0 24 24"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2Z"/><path d="M12 11v6M9 14h6"/></svg>Nova tarefa da pendência</button>
      <button class="btn" id="rp-pdf"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>Baixar PDF</button>
      <button class="btn" id="rp-improd"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8 8 8 8"/></svg>Visita improdutiva</button>
      <button class="btn" id="rp-excluir" style="color:var(--re);border-color:var(--re)"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m4 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Excluir</button>
    </span>
  </div>
  <div class="rp-wrap"><div id="rp-hero"></div><div id="rp-body"><p class="rp-msg">Carregando…</p></div><div id="rp-hist"></div></div>
</div>
</div>

<!-- Modal: Nova tarefa da pendência -->
<div class="rp-modal" id="modal-pend">
  <div class="rp-modal-box">
    <div class="rp-modal-h"><span>Nova tarefa da pendência</span><button class="rp-modal-x" id="pend-x">✕</button></div>
    <div class="rp-modal-b">
      <p class="muted" id="pend-origem" style="margin-top:0"></p>
      <div style="margin-bottom:10px"><label>Cliente</label><div id="pend-cli" style="font-weight:600"></div></div>
      <div style="margin-bottom:10px"><label>Tipo de serviço</label><select id="pend-tipo"></select></div>
      <div><label>Orientação ao técnico (pendência)</label><textarea id="pend-orient" rows="5" placeholder="Descreva o que ficou pendente…"></textarea></div>
      <p class="muted" style="margin-top:8px">Criada como <b>Aguardando execução</b>. Atribua o técnico em Tarefas.</p>
    </div>
    <div class="rp-modal-f">
      <button class="btn" id="pend-cancelar">Cancelar</button>
      <button class="btn btn-p" id="pend-criar">Criar tarefa</button>
    </div>
  </div>
</div>

<!-- Modal: motivo do ajuste (1 por lote de edição) -->
<div class="rp-modal" id="modal-motivo">
  <div class="rp-modal-box">
    <div class="rp-modal-h"><span>Motivo do ajuste</span><button class="rp-modal-x" id="mot-x">✕</button></div>
    <div class="rp-modal-b">
      <p class="muted" id="mot-resumo" style="margin-top:0"></p>
      <label>Por que esta RAT está sendo ajustada? <span style="color:var(--re)">*</span></label>
      <select id="mot-sel">
        <option value=""></option>
        <option value="esquecimento_tecnico">Esquecimento do técnico — conta no desempenho</option>
        <option value="completacao">Completação — conta no desempenho</option>
        <option value="mudanca_processo">Mudança de processo — não conta</option>
        <option value="pedido_cliente">Pedido do cliente — não conta</option>
        <option value="correcao_texto">Correção de texto — não conta</option>
        <option value="outro">Outro — não conta</option>
      </select>
      <div id="mot-det-wrap" style="display:none;margin-top:10px">
        <label>Descreva o motivo <span style="color:var(--re)">*</span></label>
        <textarea id="mot-det" rows="3" placeholder="Ex.: correção de horário digitado errado (término era 14:30)"></textarea>
      </div>
      <p class="muted" style="margin-top:8px">Fica registrado no histórico (quem · quando · valor anterior → novo) e alimenta o índice de assertividade.</p>
    </div>
    <div class="rp-modal-f">
      <button class="btn" id="mot-cancelar">Cancelar</button>
      <button class="btn btn-p" id="mot-confirmar">Salvar ajuste</button>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis']
  async function onPostLogin() { renderSidebar('tarefas'); await RatPage.init() }
  renderSidebar('tarefas')
  initAuth()
</script>
</body>
</html>
