<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deslocamentos — Calendário · Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/deslocamento-calendario.js"></script>
<style>
  /* Mesmo esqueleto do calendário de RATs (rc-*) — só tokens existentes */
  .rc-wrap{padding:20px 24px 28px;display:flex;flex-direction:column;gap:16px}
  .rc-top{display:flex;gap:14px;align-items:stretch;flex-wrap:wrap}
  .vcards{display:flex;gap:10px;flex:none}
  .vcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;width:104px;border:1px solid var(--line);background:var(--card);border-radius:14px;cursor:pointer;text-decoration:none;color:var(--tx2);font-size:13px;font-weight:700;box-shadow:0 1px 3px rgba(20,28,46,.06);transition:color .12s,background .12s,box-shadow .12s,border-color .12s}
  .vcard svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .vcard:hover{color:var(--tx)}
  .vcard.on{background:var(--ac);color:#fff;border-color:var(--ac);box-shadow:0 8px 18px rgba(30,138,224,.28)}
  .rc-fbar{flex:1;min-width:340px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;display:flex;flex-direction:column;gap:11px}
  .rc-frow{display:flex;gap:11px;flex-wrap:wrap}
  .rc-fg{display:flex;flex-direction:column}
  .rc-fg.cli{width:230px}
  .rc-fg.busca{flex:1;min-width:200px}
  .rc-ffoot{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .rc-ffoot .sp{flex:1}
  .rc-combo{position:relative}
  .rc-combo-list{position:absolute;top:100%;left:0;right:0;z-index:30;background:#fff;border:1px solid var(--bd2);border-radius:9px;margin-top:4px;max-height:240px;overflow:auto;box-shadow:0 8px 24px rgba(20,28,46,.14)}
  .rc-combo-list[hidden]{display:none}
  .rc-combo-opt{padding:8px 11px;font-size:13px;cursor:pointer;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rc-combo-opt:hover,.rc-combo-opt.on{background:var(--acl)}
  .rc-combo-empty{padding:8px 11px;font-size:12px;color:var(--tx2)}
  .rc-fbar label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px}
  .rc-fbar input,.rc-fbar select{width:100%;font:inherit;font-size:13px;color:var(--tx);background:#fff;border:1px solid var(--bd2);border-radius:9px;padding:8px 10px;outline:none}
  .rc-rev{display:inline-flex;align-items:center;gap:7px}
  .rc-rev select{width:auto;min-width:150px}
  .rc-cal{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(20,28,46,.04),0 10px 28px rgba(20,28,46,.06)}
  .rc-toolbar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .rc-nav{width:34px;height:34px;border:1px solid var(--bd2);border-radius:9px;background:#fff;color:var(--tx);display:inline-grid;place-items:center;cursor:pointer}
  .rc-nav svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .rc-mtitle{font-size:17px;font-weight:800;letter-spacing:-.4px;color:var(--title);min-width:170px}
  .rc-hoje{height:34px;padding:0 14px;border:1px solid var(--bd2);border-radius:9px;background:#fff;font:inherit;font-size:12.5px;font-weight:700;color:var(--tx);cursor:pointer}
  .rc-legend{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .rc-legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--tx2)}
  .rc-legend i{width:8px;height:8px;border-radius:50%;flex:none}
  .rc-wd{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);border-bottom:1px solid var(--line)}
  .rc-wd div{padding:9px 10px;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px}
  .rc-grid7{display:grid;grid-template-columns:repeat(7,1fr)}
  .rc-cell{min-height:152px;padding:9px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden}
  .rc-cell:nth-child(7n){border-right:none}
  .rc-cell.rc-out{background:#FAFBFC}
  .rc-dhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .rc-dnum{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--tx)}
  .rc-dnum.today{background:var(--ac);color:#fff;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(30,138,224,.35)}
  .rc-dcount{font-size:10px;font-weight:700;color:var(--tx2);background:var(--bg);border-radius:999px;padding:1px 7px}
  .rc-chip{display:block;width:100%;text-align:left;border:none;cursor:pointer;border-radius:9px;padding:8px 11px;margin-bottom:6px;overflow:hidden;font-family:inherit;text-decoration:none;color:inherit;transition:filter .12s,box-shadow .12s,transform .12s}
  .rc-chip:hover{filter:brightness(.98);box-shadow:0 4px 11px rgba(20,28,46,.14);transform:translateY(-1px)}
  .rc-chip .task{display:block;font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rc-chip .cli{display:block;font-size:12.5px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .rc-chip .tec{display:block;font-size:11.5px;font-weight:600;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rc-more{border:none;background:transparent;color:var(--ac);font-size:10.5px;font-weight:700;cursor:pointer;padding:2px 4px;font-family:inherit}
  .rc-empty{padding:40px;text-align:center;color:var(--tx2);font-size:13px}
  .rc-mback{position:fixed;inset:0;background:rgba(20,28,46,.42);display:none;place-items:center;z-index:60;padding:20px}
  .rc-mback.open{display:grid}
  .rc-modal{width:360px;max-height:80vh;overflow:auto;background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--shl)}
  .rc-modal-h{display:flex;align-items:center;margin-bottom:12px}
  .rc-modal-h .t{font-size:15px;font-weight:700;color:var(--title)}
  .rc-modal-h button{margin-left:auto;border:none;background:transparent;font-size:20px;color:var(--tx2);cursor:pointer}
  /* detalhe (só leitura) — mesmas classes da lista de deslocamentos */
  .dm-back{display:none;position:fixed;inset:0;background:rgba(20,30,55,.5);z-index:200;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
  .dm-back.open{display:flex}
  .dm-box{background:#fff;border-radius:14px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(20,30,55,.3)}
  .dm-h{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--bd);font-weight:700;font-size:15px}
  .dm-x{border:none;background:none;font-size:18px;color:var(--tx3);cursor:pointer}
  .dm-b{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
  .dm-f{display:flex;justify-content:space-between;gap:10px;padding:12px 18px;border-top:1px solid var(--bd);flex-wrap:wrap}
  .det-sec{border:1px solid var(--bd);border-radius:11px;padding:12px 14px}
  .det-sec h4{margin:0 0 8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--tx3)}
  .det-kv{display:flex;gap:10px;font-size:13px;padding:3px 0;align-items:flex-start}
  .det-kv .k{color:var(--tx2);min-width:110px;font-weight:600;flex:none}
  .det-kv .v{color:var(--tx);flex:1;min-width:0}
  .det-leg{border:1px solid var(--bd);border-left:3px solid #F4861F;border-radius:9px;padding:9px 12px;margin-bottom:8px}
  .det-leg:last-child{margin-bottom:0}
  .det-leg .lh{font-size:12.5px;font-weight:800;color:#b85e0a;margin-bottom:6px}
  .rev-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:#EEF1F5;color:#5B6573}
  .rev-pill.on{background:#E6F6EC;color:#0B7A43}
  .rc-badge-sync{display:inline-flex;align-items:center;gap:6px;background:var(--exec-bg);color:var(--exec-fg);font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px}
  .rc-badge-sync i{width:7px;height:7px;border-radius:50%;background:var(--exec-m)}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><h1>Deslocamentos</h1>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <span class="mut" id="rc-count" style="font-size:12.5px;color:var(--tx2);font-weight:600"></span>
        <span class="rc-badge-sync"><i></i>Leitura</span>
      </div>
    </div>
    <div class="scrollarea">
      <div class="rc-wrap">
        <div class="rc-top">
          <div class="vcards">
            <a href="deslocamento-calendario.html" class="vcard on"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Calendário</a>
            <a href="deslocamentos.html" class="vcard"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Lista</a>
          </div>
          <div class="rc-fbar">
            <div class="rc-frow">
              <div class="rc-fg cli"><label>Cliente</label><div class="rc-combo"><input id="dcf-cliente" autocomplete="off" placeholder="Comece a digitar…"><div class="rc-combo-list" id="dcf-cliente-list" hidden></div></div></div>
              <div class="rc-fg busca"><label>Busca geral</label><input id="dcf-busca" placeholder="Cliente, técnico, rota, nº tarefa, veículo…"></div>
            </div>
            <div class="rc-ffoot">
              <span class="rc-rev"><label style="margin:0">Revisão</label><select id="dcf-revisao"><option value="">Todas</option><option value="a_revisar">A revisar</option><option value="revisado">Revisados</option></select></span>
              <span class="sp"></span>
              <button class="btn btn-ghost" id="dcf-limpar">Limpar</button>
              <button class="btn btn-primary" id="dcf-buscar">Buscar</button>
            </div>
          </div>
        </div>

        <div class="rc-cal">
          <div class="rc-toolbar">
            <div style="display:flex;align-items:center;gap:4px">
              <button class="rc-nav" id="rc-prev" title="Mês anterior"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
              <button class="rc-nav" id="rc-next" title="Próximo mês"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
            </div>
            <div class="rc-mtitle" id="rc-title">—</div>
            <button class="rc-hoje" id="rc-hoje">Hoje</button>
            <div class="rc-legend">
              <span><i style="background:#1E8AE0"></i>Em curso</span>
              <span><i style="background:#179A47"></i>Falta revisar</span>
              <span><i style="background:#9CA3AF"></i>Revisado</span>
            </div>
          </div>
          <div class="rc-wd"><div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div></div>
          <div class="rc-grid7" id="rc-grid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- "+N mais" do dia -->
<div class="rc-mback" id="rc-mback"><div class="rc-modal"><div class="rc-modal-h"><span class="t" id="rc-modal-t"></span><button id="rc-modal-x">×</button></div><div id="rc-modal-body"></div></div></div>

<!-- Detalhe da viagem (SÓ LEITURA) + Editar / Marcar revisado -->
<div class="dm-back" id="det-back">
  <div class="dm-box">
    <div class="dm-h"><span>Detalhe da viagem</span><button class="dm-x" id="det-x">✕</button></div>
    <div class="dm-b" id="det-body"></div>
    <div class="dm-f">
      <button class="btn" id="det-fechar">Fechar</button>
      <div style="display:flex;gap:10px">
        <button class="btn" id="det-revisar">Marcar como revisado</button>
        <button class="btn btn-primary" id="det-editar">Editar</button>
      </div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis']
  async function onPostLogin() { renderSidebar('deslocamentos'); await DeslocCalApp.init() }
  renderSidebar('deslocamentos')
  initAuth()
</script>
</body>
</html>
