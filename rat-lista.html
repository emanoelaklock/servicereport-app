<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAT — Lista · Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/rat-lista.js"></script>
<style>
  .rl-wrap{padding:20px 24px 28px;display:flex;flex-direction:column;gap:16px}
  /* switch de visão Calendário/Lista (cards-botão) — em linha própria, acima do filtro */
  .vcards{display:flex;gap:10px;flex:none}
  .vcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;width:104px;padding:13px 10px;border:1px solid var(--line);background:var(--card);border-radius:14px;cursor:pointer;text-decoration:none;color:var(--tx2);font-size:13px;font-weight:700;box-shadow:0 1px 3px rgba(20,28,46,.06);transition:color .12s,background .12s,box-shadow .12s,border-color .12s}
  .vcard svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .vcard:hover{color:var(--tx)}
  .vcard.on{background:var(--ac);color:#fff;border-color:var(--ac);box-shadow:0 8px 18px rgba(30,138,224,.28)}
  /* filtros PLANOS — MESMO padrão da Lista de Tarefas (.cc-toolbar/.cc-filtros) */
  .cc-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .cc-filtros{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .cc-filtros input[type=text]{padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:13px;color:var(--tx)}
  #rlf-busca{min-width:300px}
  #rlf-cliente{min-width:190px}
  .f-sel{padding:8px 10px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:13px;background:#fff;color:var(--tx2);max-width:210px}
  .f-per{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--tx3)}
  .f-per input{padding:7px 8px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:12.5px}
  .f-count{font-size:12px;color:var(--tx3);margin-left:2px}
  .rc-combo{position:relative}
  .rc-combo-list{position:absolute;top:100%;left:0;right:0;z-index:30;background:#fff;border:1px solid var(--bd2);border-radius:9px;margin-top:4px;max-height:240px;overflow:auto;box-shadow:0 8px 24px rgba(20,28,46,.14)}
  .rc-combo-list[hidden]{display:none}
  .rc-combo-opt{padding:8px 11px;font-size:13px;cursor:pointer;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rc-combo-opt:hover{background:var(--acl)}
  .rc-combo-empty{padding:8px 11px;font-size:12px;color:var(--tx2)}
  /* lista de resultados */
  .rl-head{display:flex;align-items:center;gap:10px;margin:2px 2px 0}
  .rl-count{font-size:12.5px;font-weight:600;color:var(--tx2)}
  /* tabela — MESMO padrão da Lista de Tarefas (.cc-list) */
  .cc-list{width:100%;border-collapse:collapse;font-size:13px}
  .cc-list th{text-align:left;font-size:12px;text-transform:none;letter-spacing:normal;color:var(--tx3);padding:8px 10px;border-bottom:1px solid var(--bd)}
  .cc-list td{padding:10px;border-bottom:1px solid var(--bd);color:var(--tx)}
  .cc-list th.th-ord{cursor:pointer;white-space:nowrap;user-select:none}
  .cc-list th.th-ord:hover{color:var(--tx)}
  .cc-list tr.row-click{cursor:pointer}
  .cc-list tr.row-click:hover td{background:var(--sur2)}
  .listpanel .cc-list thead th{background:#FAFBFD;padding-top:14px;padding-bottom:14px}
  .listpanel .cc-list th:first-child,.listpanel .cc-list td:first-child{padding-left:20px}
  .listpanel .cc-list th:last-child,.listpanel .cc-list td:last-child{padding-right:20px}
  .listpanel .cc-list tbody tr:last-child td{border-bottom:none}
  .cc-num{font-family:var(--mono);font-size:12px;color:var(--tx2);white-space:nowrap}
  .cc-cli{font-weight:600;color:var(--tx)}
  .rl-sub{margin-top:2px;font-size:11.5px;color:var(--tx2);font-weight:500}
  /* prévia da Orientação ao técnico — até 2 linhas, com reticências (igual à Lista de Tarefas) */
  .cc-ori{margin-top:3px;max-width:460px;font-size:11.5px;font-weight:400;color:var(--tx2);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:normal}
  .st-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .rl-empty{padding:48px;text-align:center;color:var(--tx2);font-size:13px}
  .rl-more{align-self:center;margin-top:6px}
  .rc-badge-sync{display:inline-flex;align-items:center;gap:6px;background:var(--exec-bg);color:var(--exec-fg);font-size:12px;font-weight:600;padding:7px 13px;border-radius:999px}
  .rc-badge-sync i{width:7px;height:7px;border-radius:50%;background:var(--exec-m)}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><h1>RAT</h1>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <span class="rc-badge-sync"><i></i>Leitura</span>
      </div>
    </div>
    <div class="scrollarea">
      <div class="rl-wrap">
        <div class="vcards">
          <a href="rat-calendario.html" class="vcard"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Calendário</a>
          <a href="rat-lista.html" class="vcard on"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Lista</a>
        </div>
        <div class="cc-toolbar">
          <div class="cc-filtros">
            <input type="text" id="rlf-busca" placeholder="🔍 Buscar nº, técnico, PC, orçamento, texto da RAT…" autocomplete="off">
            <div class="rc-combo"><input type="text" id="rlf-cliente" autocomplete="off" placeholder="Cliente…"><div class="rc-combo-list" id="rlf-cliente-list" hidden></div></div>
            <select id="rlf-status" class="f-sel" title="Status"></select>
            <select id="rlf-tecnico" class="f-sel" title="Técnico responsável"></select>
            <span class="f-per"><label>de</label><input type="date" id="rlf-de"><label>até</label><input type="date" id="rlf-ate"></span>
            <button class="btn btn-primary" id="rlf-buscar">Buscar</button>
            <button class="btn" id="rlf-limpar">Limpar</button>
            <span class="f-count" id="rl-count"></span>
          </div>
        </div>

        <div class="listpanel" id="rl-panel" style="overflow-x:auto"></div>
        <button class="btn btn-ghost rl-more" id="rl-more" style="display:none">Carregar mais</button>
      </div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis', 'comercial']
  async function onPostLogin() {
    renderSidebar('rat')
    await RatListaApp.init()
  }
  renderSidebar('rat')
  initAuth()
</script>
</body>
</html>
