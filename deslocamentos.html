<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deslocamentos — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/deslocamentos.js"></script>
<style>
  .d-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .d-toolbar select,.d-toolbar input{padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:13px;background:#fff;max-width:240px}
  .d-fora{background:#FDF3E2;border:1px solid #EAD9B0;border-radius:13px;padding:14px 16px;margin-bottom:18px}
  .d-fora h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9a6a1a;margin:0 0 10px}
  .d-fora .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0e2c2;font-size:13px}
  .d-fora .row:last-child{border-bottom:none}
  .d-fora .who{font-weight:600;color:var(--tx)}
  .d-fora .sub{color:#9a6a1a;font-size:12px}
  .d-list{width:100%;border-collapse:collapse;font-size:13px}
  .d-list th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--tx3);padding:8px 10px;border-bottom:1px solid var(--bd)}
  .d-list td{padding:10px;border-bottom:1px solid var(--sur2);color:var(--tx);vertical-align:top}
  .d-sent{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
  .d-sent.ida{background:#E8F0FE;color:#1C54B8}.d-sent.volta{background:#FDF3E2;color:#B7791F}.d-sent.outro{background:var(--sur2);color:var(--tx2)}
  .d-empty{text-align:center;color:var(--tx3);font-size:13px;padding:26px 0}
  .tcard{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;box-shadow:var(--sh)}
</style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><span class="topbar-title">Deslocamentos</span></div>
    <div class="content">
      <div class="d-toolbar">
        <select id="d-tec"></select>
        <select id="d-cli"></select>
        <select id="d-sent">
          <option value="">Sentido: todos</option>
          <option value="ida">Ida</option>
          <option value="volta">Volta</option>
          <option value="outro">Outro</option>
        </select>
        <span class="d-per" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--tx3)"><label>de</label><input type="date" id="d-de"><label>até</label><input type="date" id="d-ate"></span>
        <span class="dim" id="d-count" style="font-size:12px"></span>
      </div>
      <div class="d-fora" id="d-fora" style="display:none"></div>
      <div class="tcard"><div style="overflow-x:auto"><table class="d-list">
        <thead><tr><th>Sentido</th><th>Cliente/obra</th><th>Rota</th><th>Veículo</th><th>A bordo</th><th>Saída</th><th>Chegada</th></tr></thead>
        <tbody id="d-tbody"></tbody>
      </table></div></div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis']
  async function onPostLogin() { renderSidebar('deslocamentos'); await DeslocApp.init() }
  renderSidebar('deslocamentos')
  initAuth()
</script>
</body>
</html>
