<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deslocamentos — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/deslocamentos.js"></script>
<style>
  .d-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .d-toolbar select,.d-toolbar input{padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:13px;background:#fff;max-width:240px}
  .d-fora{background:#FDF3E2;border:1px solid #EAD9B0;border-radius:13px;padding:14px 16px;margin-bottom:18px}
  .d-fora h3{font-size:13px;font-weight:700;text-transform:none;letter-spacing:normal;color:#9a6a1a;margin:0 0 10px}
  .d-fora .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0e2c2;font-size:13px}
  .d-fora .row:last-child{border-bottom:none}
  .d-fora .who{font-weight:600;color:var(--tx)}
  .d-fora .sub{color:#9a6a1a;font-size:12px}
  .d-list{width:100%;border-collapse:collapse;font-size:13px}
  .d-list th{text-align:left;font-size:11px;text-transform:none;letter-spacing:normal;color:var(--tx3);padding:8px 10px;border-bottom:1px solid var(--bd)}
  .listpanel .d-list thead th{background:#FAFBFD;padding-top:13px;padding-bottom:13px}
  .listpanel .d-list th:first-child,.listpanel .d-list td:first-child{padding-left:20px}
  .listpanel .d-list th:last-child,.listpanel .d-list td:last-child{padding-right:20px}
  .listpanel .d-list tbody tr:last-child td{border-bottom:none}
  .d-list td{padding:10px;border-bottom:1px solid var(--sur2);color:var(--tx);vertical-align:top}
  .d-sent{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
  .d-sent.ida{background:#E8F0FE;color:#1C54B8}.d-sent.volta{background:#FDF3E2;color:#B7791F}.d-sent.outro{background:var(--sur2);color:var(--tx2)}
  .d-empty{text-align:center;color:var(--tx3);font-size:13px;padding:26px 0}
  .tcard{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;box-shadow:var(--sh)}
  .d-act{display:inline-flex;gap:6px}
  .d-act button{border:1px solid var(--bd);background:#fff;border-radius:8px;padding:4px 9px;font:inherit;font-size:12px;cursor:pointer;color:var(--tx)}
  .d-act button.del{color:#B42318;border-color:#F3C6C0}
  .dm-back{display:none;position:fixed;inset:0;background:rgba(20,30,55,.5);z-index:200;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
  .dm-back.open{display:flex}
  .dm-box{background:#fff;border-radius:14px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(20,30,55,.3)}
  .dm-h{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--bd);font-weight:700;font-size:15px}
  .dm-x{border:none;background:none;font-size:18px;color:var(--tx3);cursor:pointer}
  .dm-b{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
  .dm-b label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:5px}
  .dm-b select,.dm-b input{width:100%;box-sizing:border-box;padding:9px 11px;border:1px solid var(--bd);border-radius:8px;font:inherit;font-size:14px;background:#fff;outline:none}
  .dm-row{display:flex;gap:10px}.dm-row>div{flex:1;min-width:0}
  .dm-tecs{display:flex;flex-wrap:wrap;gap:8px 14px}
  .dm-tecs label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;margin:0}
  .dm-tecs input{width:auto}
  .dm-f{display:flex;justify-content:space-between;gap:10px;padding:12px 18px;border-top:1px solid var(--bd)}
  /* status da viagem (lista) — paleta oficial */
  .vst{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .vst i{width:6px;height:6px;border-radius:50%}
  .vst.and{background:#FEF3DA;color:#92670A}.vst.and i{background:#F7B81E}
  .vst.pla{background:#E7F1FC;color:#1565C0}.vst.pla i{background:#1E8AE0}
  .vst.con{background:#E6F6EC;color:#0B7A43}.vst.con i{background:#28A94C}
  .vtipo{font-size:12.5px;font-weight:800;color:var(--tx)}
  .vper{font-size:11px;color:var(--tx3);font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums}
  /* a bordo em chips com avatar (iniciais) */
  .abchip{display:inline-flex;align-items:center;gap:6px;background:#F3F5F9;border:1px solid var(--bd);border-radius:999px;padding:3px 10px 3px 4px;font-size:11.5px;font-weight:600;color:var(--tx2);margin:2px 4px 2px 0;white-space:nowrap}
  .abchip i{width:20px;height:20px;border-radius:50%;background:#D9E5F5;color:#3a5f8f;display:grid;place-items:center;font-style:normal;font-size:9px;font-weight:800;overflow:hidden;flex:none}
  .abchip i img{width:100%;height:100%;object-fit:cover}
  /* cards de técnico COM FOTO (mesmo componente das RATs/Tarefas) */
  .vm-tecs{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
  .vm-tec{display:flex;align-items:center;gap:9px;border:1.5px solid var(--bd);border-radius:11px;padding:8px 10px;background:#fff;cursor:pointer;font:inherit;text-align:left}
  .vm-tec.on{border-color:#179A47;background:#E6F6EC}
  .vm-tec .av{width:32px;height:32px;border-radius:50%;background:#D9E5F5;color:#3a5f8f;display:grid;place-items:center;font-weight:800;font-size:11px;overflow:hidden;flex:none}
  .vm-tec .av img{width:100%;height:100%;object-fit:cover}
  .vm-tec .ti{flex:1;min-width:0}
  .vm-tec .nm{display:block;font-size:12.5px;font-weight:700;color:var(--tx);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .vm-tec .rl{display:block;font-size:10.5px;color:var(--tx3);font-weight:600;margin-top:1px}
  .vm-tec .ck{margin-left:auto;width:18px;height:18px;border-radius:6px;border:1.6px solid #C6CCDA;flex:none}
  .vm-tec.on .ck{background:#179A47;border-color:#179A47;position:relative}
  .vm-tec.on .ck::after{content:"✓";color:#fff;font-size:11px;position:absolute;inset:0;display:grid;place-items:center}
  /* editar viagem (modelo novo: trechos) — FULLSCREEN na área de conteúdo (sidebar fica visível) */
  #vm-back{padding:0;align-items:stretch;left:240px}
  @media(max-width:900px){#vm-back{left:0}}
  .vm-box{background:var(--bg,#F3F4F8);width:100%;height:100vh;max-width:none;border-radius:0;display:flex;flex-direction:column;overflow:hidden}
  .vm-box .dm-b{flex:1;overflow-y:auto;width:100%;padding:22px 28px;box-sizing:border-box}
  .vm-top{display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:14px;max-width:900px}
  .vm-cols{display:grid;grid-template-columns:minmax(380px,560px) 1fr;gap:0 26px;align-items:start}
  @media(max-width:1150px){.vm-cols{grid-template-columns:1fr}}
  .vm-box .dm-f{background:#fff;border-top:1px solid var(--bd);padding:14px 24px}
  .vm-box .dm-f>div,.vm-box .dm-f>button{max-width:none}
  .vm-h{display:flex;align-items:center;gap:10px;padding:15px 24px;background:#F4861F;color:#fff;font-weight:700;font-size:16px;flex:none}
  .vm-h svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}
  .vm-h .dm-x{color:rgba(255,255,255,.9);margin-left:auto}
  .vm-leg{border:1px solid var(--bd);border-left:3px solid #F4861F;border-radius:11px;padding:14px;margin-bottom:10px;background:#fff}
  .vm-tec{background:#fff}
  .vm-leg .vh{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:#b85e0a;margin-bottom:11px;text-transform:uppercase;letter-spacing:.4px}
  .vm-leg .vh .n{width:21px;height:21px;border-radius:50%;background:#F4861F;color:#fff;display:grid;place-items:center;font-size:10.5px;flex:none}
  .vm-leg .vh .vdel{margin-left:auto;border:none;background:none;color:#B42318;font-size:15px;cursor:pointer}
  .vm-turno{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .vm-turno select{flex:2}
  .vm-turno input[type="time"]{flex:1;min-width:0}
  .vm-turno .vdel{border:none;background:none;color:#B42318;font-size:15px;cursor:pointer;flex:none}
  .vm-addmini{border:1px dashed var(--bd);background:#FAFBFD;color:#1C54B8;border-radius:8px;padding:7px 11px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .vm-addleg{width:100%;border:1.5px dashed #C6CCDA;background:#fff;color:#1C54B8;border-radius:11px;padding:11px;font:inherit;font-size:13px;font-weight:700;cursor:pointer}
  /* almoço na estrada — card editável (um par de horários por dia da viagem) */
  .vm-alm{border:1px solid var(--bd);border-left:3px solid #F7B81E;border-radius:11px;padding:14px;margin-top:12px;background:#fff;max-width:520px}
  .vm-alm .ah{font-size:12px;font-weight:800;color:#92670A;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px}
  .vm-alm .adia{display:grid;grid-template-columns:90px 1fr 1fr auto;gap:10px;align-items:end;margin-bottom:8px}
  .vm-alm .adia .dlbl{font-size:12.5px;font-weight:700;color:var(--tx);padding-bottom:9px;font-variant-numeric:tabular-nums}
  .vm-alm .alimpa{border:none;background:none;color:#B42318;font-size:14px;cursor:pointer;padding-bottom:9px}
  .vm-alm .anota{font-size:11px;color:var(--tx3);font-weight:500;margin-top:4px;line-height:1.4}
  .vm-totcard{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#FDEFE0;border:1px solid #F2D9BC;border-radius:12px;padding:12px 16px;margin-top:12px;max-width:520px}
  .vm-totcard .k{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#b85e0a}
  .vm-totcard .v{font-size:19px;font-weight:800;color:#b85e0a;font-variant-numeric:tabular-nums;margin-left:auto}
  .vm-totcard .s{width:100%;font-size:11px;font-weight:600;color:var(--tx3)}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><h1>Deslocamentos</h1></div>
    <div class="content">
      <div class="d-toolbar">
        <select id="d-tec"></select>
        <select id="d-cli"></select>
        <select id="d-sent">
          <option value="">Status: todos</option>
          <option value="andamento">Em andamento</option>
          <option value="planejada">Planejada</option>
          <option value="concluida">Concluída</option>
          <option value="legado">Trajetos antigos (ida/volta)</option>
        </select>
        <span class="d-per" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--tx3)"><label>de</label><input type="date" id="d-de"><label>até</label><input type="date" id="d-ate"></span>
        <span class="dim" id="d-count" style="font-size:12px"></span>
      </div>
      <div class="d-fora" id="d-fora" style="display:none"></div>
      <div class="listpanel"><div style="overflow-x:auto"><table class="d-list">
        <thead><tr><th>Viagem</th><th>Cliente/obra</th><th>Rota</th><th>Veículo</th><th>A bordo</th><th>Saída</th><th>Chegada</th><th>Ações</th></tr></thead>
        <tbody id="d-tbody"></tbody>
      </table></div></div>
    </div>
  </div>
</div>

<div class="dm-back" id="dm-back">
  <div class="dm-box">
    <div class="dm-h"><span>Editar trajeto</span><button class="dm-x" id="dm-x">✕</button></div>
    <div class="dm-b">
      <input type="hidden" id="dm-id">
      <div><label>Sentido</label><select id="dm-sentido"><option value="ida">Ida</option><option value="volta">Volta</option><option value="outro">Outro</option></select></div>
      <div><label>Cliente / obra</label><select id="dm-cli"></select></div>
      <div class="dm-row">
        <div><label>Cidade (origem)</label><input type="text" id="dm-origem-cidade"></div>
        <div style="max-width:80px"><label>UF</label><input type="text" id="dm-origem-uf" maxlength="2" style="text-transform:uppercase"></div>
      </div>
      <div class="dm-row">
        <div><label>Cidade (destino)</label><input type="text" id="dm-destino-cidade"></div>
        <div style="max-width:80px"><label>UF</label><input type="text" id="dm-destino-uf" maxlength="2" style="text-transform:uppercase"></div>
      </div>
      <div><label>Veículo</label><select id="dm-veiculo"></select></div>
      <div><label>Técnicos a bordo</label><div class="dm-tecs" id="dm-tecs"></div></div>
      <div class="dm-row">
        <div><label>Saída</label><input type="datetime-local" id="dm-saida"></div>
        <div><label>Chegada</label><input type="datetime-local" id="dm-chegada"></div>
      </div>
      <div><label>Motivo</label><input type="text" id="dm-motivo"></div>
    </div>
    <div class="dm-f">
      <button class="btn del" id="dm-excluir" style="border:1px solid #F3C6C0;background:#fff;color:#B42318;border-radius:8px;padding:8px 14px;font:inherit;cursor:pointer">Excluir</button>
      <div style="display:flex;gap:10px">
        <button class="btn" id="dm-cancelar">Cancelar</button>
        <button class="btn btn-p" id="dm-salvar">Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- Editar viagem (modelo novo: trechos) -->
<div class="dm-back" id="vm-back">
  <div class="vm-box">
    <div class="vm-h"><svg viewBox="0 0 24 24"><path d="M3 17h2m14 0h2M5 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Zm10 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"/><path d="M5 17V8a1 1 0 0 1 1-1h8l4 4v6"/></svg><span>Editar viagem</span><button class="dm-x" id="vm-x">✕</button></div>
    <div class="dm-b">
      <input type="hidden" id="vm-id">
      <div class="vm-top">
        <div><label>Cliente / obra</label><select id="vm-cli"></select></div>
        <div><label>Motivo</label><input type="text" id="vm-motivo" placeholder="(opcional)"></div>
      </div>
      <div>
        <label>Trechos</label>
        <div id="vm-trechos"></div>
        <button type="button" class="vm-addleg" id="vm-addleg">+ Adicionar trecho</button>
        <div id="vm-almoco"></div>
        <div id="vm-total"></div>
      </div>
    </div>
    <div class="dm-f">
      <button class="btn del" id="vm-excluir" style="border:1px solid #F3C6C0;background:#fff;color:#B42318;border-radius:8px;padding:8px 14px;font:inherit;cursor:pointer">Excluir</button>
      <div style="display:flex;gap:10px">
        <button class="btn" id="vm-cancelar">Cancelar</button>
        <button class="btn btn-p" id="vm-salvar">Salvar</button>
      </div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis']
  async function onPostLogin() { renderSidebar('deslocamentos'); await DeslocApp.init() }
  renderSidebar('deslocamentos')
  initAuth()
</script>
</body>
</html>
