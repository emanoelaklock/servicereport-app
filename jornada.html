<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornada — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/jornada.js"></script>
<style>
  .j-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .j-toolbar select,.j-toolbar input{padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:13px;background:#fff}
  .j-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:900px){.j-kpis{grid-template-columns:repeat(2,1fr)}}
  .j-kpi{border:1px solid rgba(0,0,0,.05);border-radius:13px;padding:13px 15px}
  .j-kpi .k{font-size:11px;font-weight:600;letter-spacing:normal;text-transform:none;color:var(--tx3)}
  .j-kpi .v{font-size:19px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
  .jk-blue{background:rgba(30,138,224,.13)}   .jk-blue .v{color:#1976D2}
  .jk-green{background:rgba(40,169,76,.13)}   .jk-green .v{color:#1F8F3F}
  .jk-amber{background:rgba(245,166,35,.18)}  .jk-amber .v{color:#B07D08}
  .jk-purple{background:rgba(142,69,181,.13)} .jk-purple .v{color:#7E37A6}
  .jk-orange{background:rgba(244,134,31,.14)} .jk-orange .v{color:#C96A12}
  .j-card{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:20px 22px;box-shadow:var(--sh);margin-bottom:18px}
  .j-card h3{font-size:13px;font-weight:700;color:var(--tx);margin:0 0 12px}
  .j-cli{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--sur2);font-size:13px}
  .j-cli:last-child{border-bottom:none}
  .j-cli .h{font-family:var(--mono);font-weight:700}
  .j-cli .h .raw{color:var(--tx3);font-weight:400;font-size:11px;margin-left:6px}
  .j-seg{display:flex;align-items:center;gap:12px;border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .j-seg .s-ic{font-size:18px}.j-seg .s-main{flex:1;min-width:0}
  .j-seg .s-tt{font-size:14px;font-weight:600;color:var(--tx)}
  .j-seg .s-sub{font-size:12px;color:var(--tx3);margin-top:1px}
  .j-seg .s-dur{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .j-gap{display:flex;align-items:center;gap:8px;color:#C0241F;font-size:12px;font-weight:600;padding:4px 12px;margin-bottom:8px}
  .j-empty{text-align:center;color:var(--tx3);font-size:13px;padding:30px 0}
  .p-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .p-bar select,.p-bar input{padding:8px 11px;border:1px solid var(--bd);border-radius:var(--r);font:inherit;font-size:13px;background:#fff}
  .p-tbl{width:100%;border-collapse:collapse;font-size:13px}
  .p-tbl th{text-align:left;font-size:11px;text-transform:none;letter-spacing:normal;color:var(--tx3);padding:8px 10px;border-bottom:1px solid var(--bd)}
  .p-tbl td{padding:9px 10px;border-bottom:1px solid var(--sur2);vertical-align:top}
  .p-tbl tr.tot td{font-weight:800;border-top:2px solid var(--bd)}
  .p-noites{font-weight:800;font-variant-numeric:tabular-nums}
  .p-trip{font-size:12px;color:var(--tx3);padding:2px 0}
  .p-open{color:#B7791F;font-weight:600}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><h1>Jornada do técnico</h1></div>
    <div class="content">
      <div class="j-toolbar">
        <select id="j-tec"></select>
        <input type="date" id="j-data">
        <span class="dim" id="j-resumo" style="font-size:12px"></span>
      </div>
      <div class="j-kpis" id="j-kpis"></div>
      <div class="j-card"><h3>Horas de trabalho por cliente (faturável por hora · arredondado p/ cima 30 min)</h3><div id="j-clientes"></div></div>
      <div class="j-card"><h3>Linha do tempo</h3><div id="j-timeline"></div></div>

      <div class="j-card">
        <h3>Pernoites por técnico (período) — noites fora da base entre sair e voltar</h3>
        <div class="p-bar">
          <select id="p-tec"></select>
          <span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--tx3)"><label>de</label><input type="date" id="p-de"><label>até</label><input type="date" id="p-ate"></span>
          <button class="btn btn-p btn-sm" id="p-gerar">Gerar</button>
          <span class="dim" id="p-resumo" style="font-size:12px"></span>
        </div>
        <div style="overflow-x:auto"><table class="p-tbl">
          <thead><tr><th>Técnico</th><th>Viagens (com retorno)</th><th>Pernoites</th><th>Detalhe</th></tr></thead>
          <tbody id="p-tbody"></tbody>
        </table></div>
      </div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  window.PAGE_ALLOWED = ['admin', 'gestor_axis']
  async function onPostLogin() { renderSidebar('jornada'); await JornadaApp.init() }
  renderSidebar('jornada')
  initAuth()
</script>
</body>
</html>
