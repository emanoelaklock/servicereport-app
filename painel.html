<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/painel.js"></script>
<style>
  .kpi{cursor:pointer;transition:transform .12s ease}
  .kpi:hover{transform:translateY(-2px)}
  .pe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:26px}
  .pe-card{background:linear-gradient(135deg,#FBE3EE,#F6CFE1);border:1px solid #F2B8D2;border-left:7px solid #D63384;border-radius:16px;padding:20px 22px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;box-shadow:0 2px 8px rgba(214,51,132,.12)}
  .pe-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(214,51,132,.26)}
  .pe-no{font-size:13px;font-weight:800;color:#A82A66;letter-spacing:.4px;font-variant-numeric:tabular-nums;text-transform:uppercase}
  .pe-cli{font-weight:800;font-size:19px;margin:5px 0 9px;letter-spacing:-.3px;color:#3a1422}
  .pe-ori{font-size:14px;color:#6b4a59;line-height:1.5;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
  .pe-empty{color:#8A90A2;font-size:14px;padding:6px 2px}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><h1>Painel diário</h1></div>
    <div class="scrollarea">
      <div class="kpis">
        <div class="kpi k-blue" onclick="location.href='tarefa.html'">
          <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
          <div class="lab">Tarefas hoje</div><div class="n" id="kpi-hoje">—</div><div class="sub">RATs com data de hoje</div>
        </div>
        <div class="kpi k-amber" onclick="location.href='tarefa.html?f=concluida_pendencia'">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg></div>
          <div class="lab">Concluídas c/ pendência</div><div class="n" id="kpi-pend">—</div><div class="sub">serviço com pendência</div>
        </div>
        <div class="kpi k-purple" onclick="location.href='tarefa.html?f=a_faturar'">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2Z"/></svg></div>
          <div class="lab">A faturar</div><div class="n" id="kpi-faturar">—</div><div class="sub">completas não faturadas</div>
        </div>
        <div class="kpi k-green">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 11.5a9 9 0 1 1-5.3-8.2"/><path d="m9 11 3 3L22 4"/></svg></div>
          <div class="lab">Faturadas hoje</div><div class="n" id="kpi-fat-hoje">—</div><div class="sub">com nota lançada hoje</div>
        </div>
        <div class="kpi k-amber" id="kpi-sem-volta-card" style="display:none" onclick="location.href='jornada.html#desloc-sem-volta'" title="Conferência — abre a lista na Jornada">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg></div>
          <div class="lab">Deslocamento sem volta</div><div class="n" id="kpi-sem-volta">—</div><div class="sub">dias a verificar na jornada</div>
        </div>
      </div>

      <div class="sec-lab" id="pend-exec-lab">Tarefas pendentes de execução</div>
      <div class="pe-grid" id="pend-exec"></div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  // Apenas back-office acessa o portal.
  window.PAGE_ALLOWED = ['admin', 'gestor_axis', 'comercial']
  async function onPostLogin() {
    renderSidebar('painel')
    await PainelApp.init()
  }
  renderSidebar('painel')
  initAuth()
</script>
</body>
</html>
