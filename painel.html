<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/painel.js"></script>
<style>
  .rec-row{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:10px 0;border-top:1px solid var(--bd);font-size:13px}
  .rec-row:first-child{border-top:none}
  .rec-cli{font-weight:500;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar">
      <span class="topbar-title">Painel diário</span>
    </div>
    <div class="content">
      <div class="dash-grid">
        <div class="stat-card" onclick="location.href='relatorios.html'"><div class="stat-label">Tarefas hoje</div><div class="stat-val" id="kpi-hoje">—</div><div class="stat-sub">RATs com data de hoje</div></div>
        <div class="stat-card" onclick="location.href='relatorios.html?filtro=pendencia'"><div class="stat-label">Concluídas c/ pendência</div><div class="stat-val" id="kpi-pend">—</div><div class="stat-sub">serviço com pendência</div></div>
        <div class="stat-card" onclick="location.href='relatorios.html?filtro=faturar'"><div class="stat-label">A faturar</div><div class="stat-val" id="kpi-faturar">—</div><div class="stat-sub">completas não faturadas</div></div>
        <div class="stat-card"><div class="stat-label">Faturadas hoje</div><div class="stat-val" id="kpi-fat-hoje">—</div><div class="stat-sub">com nota lançada hoje</div></div>
      </div>
      <div class="dash-card-full">
        <div class="dash-card-title">Últimas RATs</div>
        <div id="recentes"></div>
      </div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  // Apenas back-office acessa o portal.
  window.PAGE_ALLOWED = ['admin', 'gestor_axis', 'comercial']
  async function onPostLogin() {
    renderSidebar('painel')
    await PainelApp.init()
  }
  renderSidebar('painel')
  initAuth()
</script>
</body>
</html>
