<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Service Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/design-system-admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/painel.js"></script>
<style>
  .kpi{cursor:pointer;transition:transform .12s ease}
  .kpi:hover{transform:translateY(-2px)}
  .pe-title{font-size:28px;font-weight:800;letter-spacing:-.5px;margin:6px 0 18px;color:#1a2030}
  .pe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:26px}
  .pe-card{border:1px solid #DDE2EC;border-left:7px solid #98A0B2;border-radius:16px;padding:20px 22px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;box-shadow:0 2px 8px rgba(20,30,60,.08)}
  .pe-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(20,30,60,.16)}
  .pe-no{font-size:13px;font-weight:800;letter-spacing:.4px;font-variant-numeric:tabular-nums;text-transform:uppercase}
  .pe-cli{font-weight:800;font-size:19px;margin:5px 0 9px;letter-spacing:-.3px}
  .pe-ori{font-size:14px;line-height:1.5;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
  .pe-empty{color:#8A90A2;font-size:14px;padding:6px 2px}
  /* Lembrete: devolvidas sem retorno há +1 dia (só aparece quando houver) */
  .devol-alert{background:linear-gradient(135deg,#FDECEA,#FAD9D5);border:1px solid #F3B7B2;border-left:7px solid #E5403A;border-radius:16px;padding:18px 20px;margin:2px 0 24px;box-shadow:0 2px 10px rgba(229,64,58,.12)}
  .devol-alert-h{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:800;color:#A82A22;margin-bottom:14px;letter-spacing:-.2px}
  .devol-alert-h svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}
  .devol-alert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
  .devol-alert-card{display:block;text-decoration:none;background:#fff;border:1px solid #F0C6C1;border-radius:12px;padding:13px 15px;transition:transform .12s ease,box-shadow .12s ease}
  .devol-alert-card:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(229,64,58,.16)}
  .dac-no{font-size:12px;font-weight:800;letter-spacing:.4px;color:#A82A22;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .dac-cli{font-weight:800;font-size:16px;margin:3px 0 5px;color:#2c1414;letter-spacing:-.2px}
  .dac-age{font-size:13px;font-weight:700;color:#C0362C}
  /* uma cor por card (decorativo — o status é o mesmo); ciclo na paleta oficial */
  .pe-c0{background:linear-gradient(135deg,#E7F1FC,#D4E6FB);border-color:#BFD9F5;border-left-color:#1E8AE0}
  .pe-c0 .pe-no{color:#1565C0}.pe-c0 .pe-cli{color:#15263a}.pe-c0 .pe-ori{color:#3d5168}
  .pe-c1{background:linear-gradient(135deg,#FBE3EE,#F6CFE1);border-color:#F2B8D2;border-left-color:#D63384}
  .pe-c1 .pe-no{color:#A82A66}.pe-c1 .pe-cli{color:#3a1422}.pe-c1 .pe-ori{color:#6b4a59}
  .pe-c2{background:linear-gradient(135deg,#E6F6EC,#CFEED9);border-color:#B8E6C8;border-left-color:#179A47}
  .pe-c2 .pe-no{color:#0B7A43}.pe-c2 .pe-cli{color:#123b24}.pe-c2 .pe-ori{color:#3a5a45}
  .pe-c3{background:linear-gradient(135deg,#F1E9F8,#E4D4F1);border-color:#DCC7EC;border-left-color:#8E45B5}
  .pe-c3 .pe-no{color:#6c2f96}.pe-c3 .pe-cli{color:#2c1640}.pe-c3 .pe-ori{color:#564166}
  .pe-c4{background:linear-gradient(135deg,#FDEFE0,#FADFC2);border-color:#F8D3A8;border-left-color:#F4861F}
  .pe-c4 .pe-no{color:#B85E0A}.pe-c4 .pe-cli{color:#4a2f12}.pe-c4 .pe-ori{color:#6b5236}
  .pe-c5{background:linear-gradient(135deg,#FEF3DA,#FCE7B0);border-color:#F2D98A;border-left-color:#F7B81E}
  .pe-c5 .pe-no{color:#9A6B00}.pe-c5 .pe-cli{color:#3a2f12}.pe-c5 .pe-ori{color:#6b5b32}
</style>
</head>
<body class="tec-admin">

<div id="sidebar-container"></div>

<div class="main">
  <div id="app-screen" style="display:none">
    <div class="topbar"><h1>Painel diário</h1></div>
    <div class="scrollarea">
      <div id="devol-alerta"></div>
      <h2 class="pe-title" id="pend-exec-lab">Tarefas pendentes de execução</h2>
      <div class="pe-grid" id="pend-exec"></div>
    </div>
  </div>
</div>

<div class="tc" id="tc"></div>

<script>
  // Apenas back-office acessa o portal.
  window.PAGE_ALLOWED = ['admin', 'gestor_axis', 'comercial']
  async function onPostLogin() {
    renderSidebar('painel')
    await PainelApp.init()
  }
  renderSidebar('painel')
  initAuth()
</script>
</body>
</html>
